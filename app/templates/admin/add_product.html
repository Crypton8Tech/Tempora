{% extends "admin/base.html" %}
{% block title %}Добавить товар{% endblock %}

{% block content %}
<div class="admin-page-header">
    <h2 class="admin-page-title">Добавить товар</h2>
    <a href="/admin/products" class="admin-btn admin-btn-outline">← Назад</a>
</div>

{% if error %}
<div class="admin-error" style="margin-bottom:16px;">{{ error }}</div>
{% endif %}

<div class="admin-card">
    <form method="post" action="/admin/products/add" enctype="multipart/form-data" class="admin-form">
        <div class="form-group">
            <label>Название *</label>
            <input type="text" name="name" class="admin-input" placeholder="Rolex Submariner Date" required>
        </div>
        <div class="form-group">
            <label>Name (EN)</label>
            <input type="text" name="name_en" class="admin-input" placeholder="English name">
        </div>
        <div class="form-group">
            <label>SKU (артикул) *</label>
            <input type="text" name="sku" class="admin-input" placeholder="rolex-submariner-001" required>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
                <label>Бренд</label>
                <input type="text" name="brand" class="admin-input" placeholder="Rolex">
            </div>
            <div class="form-group">
                <label>Модель</label>
                <input type="text" name="model" class="admin-input" placeholder="Submariner Date">
            </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
                <label>Цена (₽) *</label>
                <input type="number" name="price" class="admin-input" placeholder="1500000" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Категория *</label>
                <select name="category_id" class="admin-input" required>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Описание</label>
            <textarea name="description" class="admin-input" rows="5" placeholder="Подробное описание товара..."></textarea>
        </div>
        <div class="form-group">
            <label>Description (EN)</label>
            <textarea name="description_en" class="admin-input" rows="5" placeholder="English description..."></textarea>
        </div>
        <div class="form-group">
            <label>Фотографии</label>
            <input type="file" name="images" class="admin-input" multiple accept="image/*">
            <small style="color:#6b7280;">Можно выбрать несколько файлов</small>
        </div>
        <button type="submit" class="admin-btn admin-btn-primary" style="padding:12px 32px;">
            <i class="fas fa-plus"></i> Добавить товар
        </button>
    </form>
</div>
{% endblock %}
