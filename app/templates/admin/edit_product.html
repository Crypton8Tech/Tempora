{% extends "admin/base.html" %}
{% block title %}Редактировать товар{% endblock %}

{% block content %}
<div class="admin-page-header">
    <h2 class="admin-page-title">Редактировать: {{ product.name }}</h2>
    <a href="/admin/products" class="admin-btn admin-btn-outline">← Назад</a>
</div>

{% if error %}
<div class="admin-error" style="margin-bottom:16px;">{{ error }}</div>
{% endif %}

<div class="admin-card">
    <!-- Existing images -->
    {% if product.images %}
    <div style="margin-bottom:24px;">
        <label style="font-weight:600;color:#374151;display:block;margin-bottom:8px;">Текущие фото</label>
        <div class="admin-images">
            {% for img in product.images %}
            <div class="admin-image-item">
                <img src="{{ img.url }}" alt="">
                <form method="post" action="/admin/products/delete-image/{{ img.id }}" style="margin:0;">
                    <button type="submit" class="admin-image-delete" title="Удалить фото">×</button>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endif %}

    <form method="post" action="/admin/products/edit/{{ product.id }}" enctype="multipart/form-data" class="admin-form">
        <div class="form-group">
            <label>Название *</label>
            <input type="text" name="name" class="admin-input" value="{{ product.name }}" required>
        </div>
        <div class="form-group">
            <label>Name (EN)</label>
            <input type="text" name="name_en" class="admin-input" value="{{ product.name_en or '' }}">
        </div>
        <div class="form-group">
            <label>SKU (артикул) *</label>
            <input type="text" name="sku" class="admin-input" value="{{ product.sku }}" required>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
                <label>Бренд</label>
                <input type="text" name="brand" class="admin-input" value="{{ product.brand }}">
            </div>
            <div class="form-group">
                <label>Модель</label>
                <input type="text" name="model" class="admin-input" value="{{ product.model }}">
            </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
                <label>Цена (₽) *</label>
                <input type="number" name="price" class="admin-input" value="{{ product.price }}" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Категория *</label>
                <select name="category_id" class="admin-input" required>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if cat.id == product.category_id %}selected{% endif %}>{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Описание</label>
            <textarea name="description" class="admin-input" rows="5">{{ product.description }}</textarea>
        </div>
        <div class="form-group">
            <label>Description (EN)</label>
            <textarea name="description_en" class="admin-input" rows="5">{{ product.description_en or '' }}</textarea>
        </div>
        <div class="form-group">
            <label>Статус</label>
            <select name="is_active" class="admin-input">
                <option value="true" {% if product.is_active %}selected{% endif %}>Активен</option>
                <option value="false" {% if not product.is_active %}selected{% endif %}>Скрыт</option>
            </select>
        </div>
        <div class="form-group">
            <label>Добавить фотографии</label>
            <input type="file" name="images" class="admin-input" multiple accept="image/*">
        </div>
        <button type="submit" class="admin-btn admin-btn-primary" style="padding:12px 32px;">
            <i class="fas fa-save"></i> Сохранить
        </button>
    </form>
</div>
{% endblock %}
