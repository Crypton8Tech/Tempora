<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Админ-панель{% endblock %} — TemporaShop</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg?v=2">
    <link rel="alternate icon" type="image/png" href="/static/images/logo.png?v=2">
    <link rel="apple-touch-icon" href="/static/images/logo.png?v=2">
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta name="csrf-token" content="{{ request.state.csrf_token if request.state.csrf_token else '' }}">
</head>
<body class="admin-body">
    <header class="admin-header">
        <h1>TemporaShop Admin</h1>
        <nav class="admin-nav">
            <a href="/admin">Дашборд</a>
            <a href="/admin/products">Товары</a>
            <a href="/admin/orders">Заказы</a>
            <a href="/admin/settings">Настройки</a>
            <a href="/" target="_blank">Сайт ↗</a>
            <a href="/admin/logout">Выйти</a>
        </nav>
    </header>

    <div class="admin-content">
        {% block content %}{% endblock %}
    </div>
    <script>
        (function () {
            const token = (document.querySelector('meta[name="csrf-token"]') || {}).content || '';
            document.querySelectorAll('form[method="post"], form[method="POST"]').forEach((form) => {
                if (form.querySelector('input[name="csrf_token"]')) {
                    return;
                }
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'csrf_token';
                input.value = token;
                form.appendChild(input);
            });
        })();
    </script>
</body>
</html>
