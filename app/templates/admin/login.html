<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Админ-панель</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <div class="admin-login-page">
        <div class="admin-login-card">
            <h1>🔐 Админ-панель</h1>
            {% if error %}
            <div class="admin-error">{{ error }}</div>
            {% endif %}
            <form method="post" action="/admin/login">
                <div class="form-group">
                    <label>Логин</label>
                    <input type="text" name="username" class="admin-input" required autofocus>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" name="password" class="admin-input" required>
                </div>
                <button type="submit" class="admin-btn admin-btn-primary" style="width:100%;padding:12px;font-size:0.95rem;">Войти</button>
            </form>
        </div>
    </div>
</body>
</html>
